build:
  maxIssues: -1

complexity:
  LongMethod:
    threshold: 200
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 10
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 30
  CyclomaticComplexMethod:
    threshold: 25

style:
  MagicNumber:
    active: false
  MaxLineLength:
    maxLineLength: 150
  UnusedParameter:
    allowedNames: "_.*"
  WildcardImport:
    active: false
  ReturnCount:
    max: 5

naming:
  FunctionNaming:
    functionPattern: "[a-zA-Z][a-zA-Z0-9]*"
  TopLevelPropertyNaming:
    constantPattern: "[A-Za-z][_A-Za-z0-9]*"

potential-bugs:
  HasPlatformType:
    active: true

performance:
  SpreadOperator:
    active: false
